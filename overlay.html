<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstraOffer Overlay</title>
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self' blob:; script-src 'self' blob: 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; worker-src 'self' blob:; connect-src 'self'" />
    <style>
      /* Make the browser window itself transparent */
      html, body { background: transparent !important; margin: 0; padding: 0; }
      #overlay-root { width: 100vw; height: 100vh; }
    </style>
  </head>
  <body>
    <div id="overlay-root"></div>
    <script type="module" src="/src/overlay-main.tsx"></script>
  </body>
</html>
